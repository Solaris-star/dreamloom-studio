version: '3.8'

x-app-environment: &app-environment
  NOVEL_BOOKS_DIR: ${NOVEL_DOCKER_BOOKS_DIR:-/app/books}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  AGENT_TASK_WS_PORT: ${AGENT_TASK_WS_PORT:-8787}
  AGENT_TASK_WS_ENABLED: ${AGENT_TASK_WS_ENABLED:-true}
  AGENT_TASK_QUEUE_ENABLED: ${AGENT_TASK_QUEUE_ENABLED:-false}
  AGENT_TASK_QUEUE_NAME: ${AGENT_TASK_QUEUE_NAME:-novel-agent-writing}
  AGENT_TASK_QUEUE_CONCURRENCY: ${AGENT_TASK_QUEUE_CONCURRENCY:-1}
  AGENT_TASK_QUEUE_ATTEMPTS: ${AGENT_TASK_QUEUE_ATTEMPTS:-1}
  AGENT_TASK_QUEUE_BACKOFF_MS: ${AGENT_TASK_QUEUE_BACKOFF_MS:-3000}
  AGENT_TASK_QUEUE_JOB_TIMEOUT_MS: ${AGENT_TASK_QUEUE_JOB_TIMEOUT_MS:-900000}
  AGENT_TASK_QUEUE_LOCK_DURATION_MS: ${AGENT_TASK_QUEUE_LOCK_DURATION_MS:-300000}
  AGENT_TASK_QUEUE_PROVIDER_CONCURRENCY: ${AGENT_TASK_QUEUE_PROVIDER_CONCURRENCY:-}
  AGENT_TASK_QUEUE_PROVIDER_TIMEOUT_MS: ${AGENT_TASK_QUEUE_PROVIDER_TIMEOUT_MS:-}
  AGENT_TASK_QUEUE_DEFAULT_PROVIDER_CONCURRENCY: ${AGENT_TASK_QUEUE_DEFAULT_PROVIDER_CONCURRENCY:-1}
  AGENT_TASK_QUEUE_REDIS_CONNECT_TIMEOUT_MS: ${AGENT_TASK_QUEUE_REDIS_CONNECT_TIMEOUT_MS:-3000}
  NOVEL_ALLOW_OPEN_AUTH: ${NOVEL_ALLOW_OPEN_AUTH:-false}
  NOVEL_TRUST_PROXY: ${NOVEL_TRUST_PROXY:-false}
  NOVEL_AUTH_REDIS: ${NOVEL_AUTH_REDIS:-true}
  NOVEL_AUTH_REQUIRE_REDIS: ${NOVEL_AUTH_REQUIRE_REDIS:-false}
  NOVEL_AUTH_REDIS_CONNECT_TIMEOUT_MS: ${NOVEL_AUTH_REDIS_CONNECT_TIMEOUT_MS:-3000}
  NOVEL_AUTH_STRICT: ${NOVEL_AUTH_STRICT:-false}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  CUSTOM_TEXT_API_KEY: ${CUSTOM_TEXT_API_KEY:-}
  TONGYI_API_KEY: ${TONGYI_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  DOUBAO_IMAGE_API_KEY: ${DOUBAO_IMAGE_API_KEY:-}
  CUSTOM_IMAGE_API_KEY: ${CUSTOM_IMAGE_API_KEY:-}

services:
  app:
    build:
      context: .
      target: dev
    ports:
      - '${WEB_PORT:-5174}:5174'
      - '${AGENT_TASK_WS_PORT:-8787}:8787'
    environment:
      <<: *app-environment
      AGENT_TASK_WORKER_ENABLED: 'false'
    volumes:
      - .:/app
      - zhimeng_books:${NOVEL_DOCKER_BOOKS_DIR:-/app/books}
    depends_on:
      - redis
    command: ['npm', 'run', 'dev', '--', '--host', '0.0.0.0', '--port', '5174']

  worker:
    build:
      context: .
      target: dev
    environment:
      <<: *app-environment
      AGENT_TASK_QUEUE_ENABLED: ${AGENT_TASK_QUEUE_ENABLED:-true}
      AGENT_TASK_WORKER_ENABLED: 'true'
    volumes:
      - .:/app
      - zhimeng_books:${NOVEL_DOCKER_BOOKS_DIR:-/app/books}
    depends_on:
      - redis
    command: ['npm', 'run', 'start:worker']
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data

volumes:
  zhimeng_books:
  redis_data:
